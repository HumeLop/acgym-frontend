<div class="flex h-screen overflow-hidden">
  <app-navigation-sidebar [isOpen]="isSidebarOpen()" />

  @if (isSidebarOpen()) {
    <div class="fixed inset-0 z-20 bg-black/50 lg:hidden" (click)="toggleSidebar()"></div>
  }

  <div class="flex flex-col flex-1 overflow-hidden">
    <app-mobile-header (toggle)="toggleSidebar()" />
    <main class="flex-1 overflow-y-auto bg-gray-50 dark:bg-gray-950 p-4 lg:p-8">
      <router-outlet />
    </main>
  </div>
</div>
