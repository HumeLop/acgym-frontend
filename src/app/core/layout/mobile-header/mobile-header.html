<header
  class="flex items-center justify-between h-16 px-6 border-b border-gray-200 dark:border-gray-700 lg:hidden shrink-0"
>
  <span class="text-lg font-bold text-orange-500">AcGym</span>

  <button
    (click)="toggle.emit()"
    class="flex items-center justify-center w-10 h-10 text-orange-500 transition-all duration-300 bg-white border border-gray-200 rounded-xl hover:bg-gray-100 dark:bg-gray-900 dark:text-orange-500 dark:hover:bg-gray-800 dark:border-gray-700"
    aria-label="Toggle sidebar"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-5 w-5"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M4 6h16M4 12h16M4 18h16"
      />
    </svg>
  </button>
</header>
