<div
  class="fixed inset-0 z-50 flex items-end justify-center bg-black/60 p-3 backdrop-blur-sm sm:items-center sm:p-4"
  (click)="onCancel()"
>
  <div
    (click)="$event.stopPropagation()"
    class="w-full max-w-lg overflow-hidden rounded-t-2xl border border-gray-200 bg-white shadow-2xl dark:border-gray-700 dark:bg-gray-800 sm:rounded-2xl"
  >
    <div class="flex justify-center pt-2 pb-0 sm:hidden">
      <div class="h-1 w-10 rounded-full bg-gray-300 dark:bg-gray-600"></div>
    </div>
    <div
      class="h-1.5"
      [class.bg-orange-500]="type() === 'confirm'"
      [class.bg-red-500]="type() === 'destructive'"
    ></div>

    <div class="p-5 sm:p-6">
      <!-- Header con Icono y Título -->
      <div class="flex items-start gap-4">
        <div
          [class]="
            'flex h-14 w-14 shrink-0 items-center justify-center rounded-2xl ' +
            (type() === 'confirm'
              ? 'bg-orange-100 dark:bg-orange-900/40'
              : 'bg-red-100 dark:bg-red-900/40')
          "
        >
          <tui-icon
            [icon]="icon()"
            [class]="
              'text-3xl! ' +
              (type() === 'confirm'
                ? 'text-orange-600 dark:text-orange-400'
                : 'text-red-600 dark:text-red-400')
            "
          />
        </div>

        <div class="min-w-0 flex-1">
          <h3 class="text-lg font-bold tracking-tight text-gray-900 dark:text-white">
            {{ title() }}
          </h3>
          <p class="mt-1 text-sm text-gray-600 dark:text-gray-300">
            {{ message() }}
          </p>
        </div>
      </div>

      <!-- Caja de énfasis -->
      <div
        class="mt-5 rounded-2xl border p-4"
        [class.border-orange-200]="type() === 'confirm'"
        [class.bg-orange-50]="type() === 'confirm'"
        [class.dark:border-orange-900/40]="type() === 'confirm'"
        [class.dark:bg-orange-900/10]="type() === 'confirm'"
        [class.border-red-200]="type() === 'destructive'"
        [class.bg-red-50]="type() === 'destructive'"
        [class.dark:border-red-900/40]="type() === 'destructive'"
        [class.dark:bg-red-900/10]="type() === 'destructive'"
      >
        <p
          class="text-sm font-medium"
          [class.text-orange-800]="type() === 'confirm'"
          [class.dark:text-orange-200]="type() === 'confirm'"
          [class.text-red-800]="type() === 'destructive'"
          [class.dark:text-red-200]="type() === 'destructive'"
        >
          {{
            type() === 'destructive'
              ? 'Esta acción no se puede deshacer.'
              : 'Confirma para continuar con esta acción.'
          }}
        </p>
      </div>

      <!-- Acciones -->
      <div class="mt-6 flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
        <button
          (click)="onCancel()"
          class="inline-flex w-full items-center justify-center rounded-2xl border-2 border-gray-300 px-5 py-3 text-sm font-semibold text-gray-700 transition-all duration-200 hover:bg-gray-100 dark:border-gray-600 dark:text-gray-300 dark:hover:bg-gray-700 sm:w-auto"
        >
          {{ cancelText() }}
        </button>
        <button
          (click)="onConfirm()"
          [disabled]="disabled()"
          [class]="
            'inline-flex w-full items-center justify-center rounded-2xl px-5 py-3 text-sm font-semibold text-white transition-all duration-200 sm:w-auto disabled:cursor-not-allowed disabled:opacity-50 ' +
            (type() === 'confirm'
              ? 'bg-orange-600 hover:bg-orange-700'
              : 'bg-red-600 hover:bg-red-700')
          "
        >
          @if (disabled()) {
            <span
              class="w-5 h-5 border-2 border-white rounded-full border-t-transparent animate-spin"
            ></span>
          } @else {
            {{ confirmText() }}
          }
        </button>
      </div>
    </div>
  </div>
</div>
