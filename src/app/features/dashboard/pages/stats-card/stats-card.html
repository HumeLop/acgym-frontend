<div
  (click)="onCardClick()"
  (keydown.enter)="onCardClick()"
  [attr.role]="isClickable() ? 'button' : null"
  [attr.tabindex]="isClickable() ? 0 : null"
  class="relative p-4 overflow-hidden rounded-2xl border transition-all duration-200 bg-white dark:bg-[#0f1624] border-slate-200 dark:border-[#1e3a5f] shadow-sm"
  [class.cursor-pointer]="isClickable()"
  [class.hover:border-orange-300]="isClickable()"
  [class.dark:hover:border-orange-600]="isClickable()"
  [class.hover:shadow-md]="isClickable()"
  [class.hover:scale-[1.02]]="isClickable()"
>
  <div
    class="absolute inset-x-0 top-0 h-0.5 rounded-t-2xl"
    [style.background]="accentBarStyle()"
  ></div>

  <div class="flex items-start gap-3">
    <div
      class="flex items-center justify-center w-10 h-10 rounded-xl shrink-0 shadow-sm {{
        bgColorClass()
      }}"
    >
      <tui-icon [icon]="iconName()" class="text-base {{ iconColorClass() }}" />
    </div>

    <div class="flex-1 min-w-0">
      <p
        class="text-[11px] font-semibold text-slate-500 dark:text-slate-400 truncate tracking-wide"
      >
        {{ title() }}
      </p>
      <p
        class="font-extrabold text-slate-900 dark:text-white tabular-nums tracking-tight mt-0.5 leading-none"
        [class.text-lg]="value().toString().length <= 10"
        [class.text-sm]="value().toString().length > 10"
      >
        {{ value() }}
      </p>
    </div>
  </div>
</div>
