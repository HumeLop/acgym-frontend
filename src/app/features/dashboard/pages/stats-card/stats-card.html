<div
  (click)="onCardClick()"
  appearance="floating"
  tuiCardLarge="compact"
  class="flex flex-col items-center justify-center min-h-30 sm:min-h-35"
  [class.cursor-pointer]="isClickable()"
  [class.group]="isClickable()"
>
  <div class="flex flex-col items-center gap-3 text-center">
    <div
      class="flex items-center justify-center w-12 h-12 rounded-xl sm:w-14 sm:h-14 {{
        bgColorClass()
      }}"
      [class.group-hover:scale-110]="isClickable()"
    >
      <tui-icon [icon]="'@tui.' + icon()" class="text-lg sm:text-xl {{ iconColorClass() }}" />
    </div>
    <div>
      <p class="text-xs font-medium text-slate-500 dark:text-slate-400 leading-tight">
        {{ title() }}
      </p>
      <p
        class="mt-0.5 font-bold text-slate-900 dark:text-slate-100 leading-tight"
        [class.text-2xl]="value().toString().length <= 8"
        [class.text-base]="value().toString().length > 8"
      >
        {{ value() }}
      </p>
    </div>
  </div>
</div>
