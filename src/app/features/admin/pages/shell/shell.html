<div class="min-h-screen pb-24 bg-(--tui-background-base)">
  <!-- HEADER -->
  <div class="px-3 pt-4 pb-3 sm:px-6">
    <div class="flex items-center gap-3">
      <div
        class="flex items-center justify-center w-10 h-10 rounded-2xl bg-linear-to-br from-(--tui-primary) to-(--tui-primary-hover) shadow-lg shadow-(--tui-primary)/25"
      >
        <tui-icon icon="@tui.shield" class="text-xl text-white" />
      </div>
      <div>
        <h1 class="text-xl font-bold tracking-tight text-(--tui-text-primary)">Administración</h1>
        <p class="mt-0.5 text-xs font-medium text-(--tui-text-secondary)">Gestión del sistema</p>
      </div>
    </div>
  </div>

  <!-- SUB-NAVEGACIÓN -->
  <div class="px-3 sm:px-6 pb-4">
    <div
      class="overflow-hidden rounded-2xl border shadow-sm bg-(--tui-background-elevated-1) border-(--tui-border-normal)"
    >
      <tui-segmented
        class="px-4 py-2"
        [activeItemIndex]="activeTab()"
        (activeItemIndexChange)="onTabChange($event)"
      >
        @for (tab of tabs; track tab.route) {
          <button tuiSegmented type="button">
            <tui-icon [icon]="tab.icon" class="mr-1.5" />
            {{ tab.label }}
          </button>
        }
      </tui-segmented>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="px-3 sm:px-6">
    <router-outlet />
  </div>
</div>
